name: Deploy to VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/apps/DevelopersHub
            git pull origin main

            cd backend
            mvn clean package
            systemctl restart developerhub-backend

            cd ../frontend
            npm install
            npm run build
            rm -rf /var/www/developerhub/*
            cp -r dist/* /var/www/developerhub/
            systemctl reload nginx
